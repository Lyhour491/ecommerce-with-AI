openapi: 3.0.3
info:
  title: MarketAI API
  version: 1.0.0
  description: |
    REST API documentation for the MarketAI ecommerce platform.

    Protected endpoints use Laravel Sanctum bearer tokens. Click Authorize in Swagger UI
    and paste a token from the login response as: Bearer your-token-here.
servers:
  - url: "{{API_BASE_URL}}"
    description: Current Laravel API host
tags:
  - name: Auth
    description: Registration, login, profile, and password flows.
  - name: Catalog
    description: Public category, product, and review browsing.
  - name: AI
    description: Product recommendations, chat, generation, and moderation checks.
  - name: Customer
    description: Customer cart, wishlist, checkout, orders, messages, and reviews.
  - name: Seller
    description: Seller dashboard, product, order, payout, and AI insight endpoints.
  - name: Admin
    description: Platform administration for products, users, orders, categories, and moderation.
  - name: Admin Settings
    description: Platform-wide settings used by the admin system settings page.
  - name: Admin Payouts
    description: Admin payout queue and processing actions.

paths:
  /register:
    post:
      tags: [Auth]
      summary: Register a customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /login:
    post:
      tags: [Auth]
      summary: Login and receive a Sanctum bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/{provider}/redirect:
    get:
      tags: [Auth]
      summary: Get a social login redirect URL
      parameters:
        - $ref: "#/components/parameters/AuthProvider"
      responses:
        "200":
          description: Redirect URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
        "400":
          $ref: "#/components/responses/Error"

  /auth/{provider}/callback:
    post:
      tags: [Auth]
      summary: Complete social login callback
      parameters:
        - $ref: "#/components/parameters/AuthProvider"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Social login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"

  /forgot-password:
    post:
      tags: [Auth]
      summary: Send a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "422":
          $ref: "#/components/responses/ValidationError"

  /reset-password:
    post:
      tags: [Auth]
      summary: Reset password with emailed token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "422":
          $ref: "#/components/responses/ValidationError"

  /user:
    get:
      tags: [Auth]
      summary: Get the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /user/profile:
    put:
      tags: [Auth]
      summary: Update the authenticated user's profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"

  /user/password:
    put:
      tags: [Auth]
      summary: Update the authenticated user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdateRequest"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"

  /logout:
    post:
      tags: [Auth]
      summary: Revoke the current access token
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /categories:
    get:
      tags: [Catalog]
      summary: List categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      tags: [Admin]
      summary: Create a category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryWriteRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /categories/{category}:
    get:
      tags: [Catalog]
      summary: Show one category
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "200":
          description: Category detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Admin]
      summary: Update a category
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryWriteRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Admin]
      summary: Delete a category
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "403":
          $ref: "#/components/responses/Forbidden"

  /products:
    get:
      tags: [Catalog]
      summary: List products
      description: Admin users may include inactive products with include_inactive=true.
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: include_inactive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      tags: [Admin]
      summary: Create a product as admin
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ProductWrite"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /top-products:
    get:
      tags: [Catalog]
      summary: List top-selling products
      responses:
        "200":
          description: Top product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{product}:
    get:
      tags: [Catalog]
      summary: Show one product
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Admin]
      summary: Update a product as admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        $ref: "#/components/requestBodies/ProductWrite"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Admin]
      summary: Delete a product as admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "403":
          $ref: "#/components/responses/Forbidden"

  /products/{product}/reviews:
    get:
      tags: [Catalog]
      summary: List product reviews
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product review list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      tags: [Customer]
      summary: Create a product review
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewWriteRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  review:
                    $ref: "#/components/schemas/Review"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"

  /ai/chat:
    post:
      tags: [AI]
      summary: Send a chat message to the assistant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        "200":
          description: AI chat response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /ai/recommend-products:
    get:
      tags: [AI]
      summary: Get AI product recommendations
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Recommendation response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /seller/apply:
    post:
      tags: [Customer]
      summary: Submit a seller application
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SellerApplicationRequest"
      responses:
        "200":
          description: Seller application submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationError"

  /cart:
    get:
      tags: [Customer]
      summary: List authenticated user's cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
    post:
      tags: [Customer]
      summary: Add a product to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartWriteRequest"
      responses:
        "201":
          description: Product added to cart
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  cart:
                    $ref: "#/components/schemas/CartItem"
        "400":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"

  /cart/{cart}:
    put:
      tags: [Customer]
      summary: Update a cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CartId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Cart item updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  cart:
                    $ref: "#/components/schemas/CartItem"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Customer]
      summary: Remove a cart item
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CartId"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "403":
          $ref: "#/components/responses/Forbidden"

  /cart-clear:
    delete:
      tags: [Customer]
      summary: Clear authenticated user's cart
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/Message"

  /wishlist:
    get:
      tags: [Customer]
      summary: List authenticated user's wishlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wishlisted active products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      tags: [Customer]
      summary: Add product to wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id:
                  type: integer
      responses:
        "201":
          description: Wishlist item created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "422":
          $ref: "#/components/responses/ValidationError"

  /wishlist/{productId}:
    delete:
      tags: [Customer]
      summary: Remove product from wishlist
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/Message"

  /checkout:
    post:
      tags: [Customer]
      summary: Checkout the authenticated user's cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "201":
          description: Checkout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  order:
                    $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/ValidationError"

  /orders:
    get:
      tags: [Customer]
      summary: List authenticated user's orders
      description: Admin users receive all orders.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{order}:
    get:
      tags: [Customer]
      summary: Show one order
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      tags: [Admin]
      summary: Update an order as admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/OrderStatus"
                shipping_address:
                  type: string
                phone:
                  type: string
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  order:
                    $ref: "#/components/schemas/Order"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /orders/{order}/status:
    patch:
      tags: [Customer]
      summary: Update order status as admin or seller owner
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/OrderStatus"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  order:
                    $ref: "#/components/schemas/Order"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /orders/{order}/messages:
    get:
      tags: [Customer]
      summary: List messages for an order
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      tags: [Customer]
      summary: Send a message for an order
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageWriteRequest"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /seller/stats:
    get:
      tags: [Seller]
      summary: Get seller dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Seller stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_products:
                    type: integer
                  total_stock:
                    type: integer
                  total_sold:
                    type: integer
                  total_revenue:
                    type: number
                    format: float
        "403":
          $ref: "#/components/responses/Forbidden"

  /seller/products:
    get:
      tags: [Seller]
      summary: List authenticated seller's products
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Seller product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      tags: [Seller]
      summary: Create a seller product
      description: AI safety checks may hold suspicious products for admin review before they become public.
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ProductWrite"
      responses:
        "201":
          description: Seller product created or queued for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /seller/products/{product}:
    get:
      tags: [Seller]
      summary: Show an owned seller product
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      tags: [Seller]
      summary: Update an owned seller product
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        $ref: "#/components/requestBodies/ProductWrite"
      responses:
        "200":
          description: Seller product updated or queued for review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Seller]
      summary: Delete an owned seller product
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        "403":
          $ref: "#/components/responses/Forbidden"

  /seller/orders:
    get:
      tags: [Seller]
      summary: List orders containing the seller's products
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Seller order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /seller/ai/generate-product-content:
    post:
      tags: [Seller, AI]
      summary: Generate product copy for a seller
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category:
                  type: string
                keywords:
                  type: string
      responses:
        "200":
          description: Generated content
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /seller/ai/product-title:
    post:
      tags: [Seller, AI]
      summary: Generate an AI product title
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/AiProductPrompt"
      responses:
        "200":
          description: Generated product title
          content:
            application/json:
              schema:
                type: object
                properties:
                  title:
                    type: string

  /seller/ai/product-description:
    post:
      tags: [Seller, AI]
      summary: Generate an AI product description
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/AiProductPrompt"
      responses:
        "200":
          description: Generated product description
          content:
            application/json:
              schema:
                type: object
                properties:
                  description:
                    type: string

  /seller/ai/product-category:
    post:
      tags: [Seller, AI]
