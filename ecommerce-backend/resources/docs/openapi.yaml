components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum token

  parameters:
    AuthProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [google, facebook]
    CategoryId:
      name: category
      in: path
      required: true
      schema:
        type: integer
    ProductId:
      name: product
      in: path
      required: true
      schema:
        type: integer
    CartId:
      name: cart
      in: path
      required: true
      schema:
        type: integer
    OrderId:
      name: order
      in: path
      required: true
      schema:
        type: integer
    UserId:
      name: user
      in: path
      required: true
      schema:
        type: integer

  requestBodies:
    AiProductPrompt:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [prompt]
            properties:
              prompt:
                type: string
                maxLength: 1000

    ProductWrite:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/ProductWriteRequest"
        application/json:
          schema:
            $ref: "#/components/schemas/ProductJsonWriteRequest"

  responses:
    Message:
      description: Operation message
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    Unauthenticated:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    AuthResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation]
      properties:
        name:
          type: string
          example: Demo Customer
        email:
          type: string
          format: email
          example: customer@example.com
        password:
          type: string
          minLength: 6
          format: password
        password_confirmation:
          type: string
          minLength: 6
          format: password

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@gmail.com
        password:
          type: string
          format: password
          example: password

    ResetPasswordRequest:
      type: object
      required: [token, email, password, password_confirmation]
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          format: password
        password_confirmation:
          type: string
          minLength: 6
          format: password

    ProfileUpdateRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        zip_code:
          type: string
          nullable: true
        avatar:
          type: string
          nullable: true
        shop_name:
          type: string
          nullable: true
        shop_description:
          type: string
          nullable: true
        shop_category:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        business_phone:
          type: string
          nullable: true
        business_address:
          type: string
          nullable: true
        business_city:
          type: string
          nullable: true
        business_state:
          type: string
          nullable: true
        business_zip:
          type: string
          nullable: true
        business_country:
          type: string
          nullable: true

    PasswordUpdateRequest:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
          format: password
        password:
          type: string
          minLength: 6
          format: password
        password_confirmation:
          type: string
          minLength: 6
          format: password

    CategoryWriteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true

    ProductWriteRequest:
      type: object
      required: [category_id, name, price, stock]
      properties:
        category_id:
          type: integer
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
          minimum: 0
        stock:
          type: integer
          minimum: 0
        tags:
          type: string
          nullable: true
        images:
          type: array
          items:
            type: string
            format: binary
        image_urls:
          type: array
          items:
            type: string
            format: uri
        replace_images:
          type: boolean

    ProductJsonWriteRequest:
      allOf:
        - $ref: "#/components/schemas/ProductWriteRequest"
      description: Use image_urls when sending JSON. File uploads require multipart/form-data.

    CartWriteRequest:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: integer
        quantity:
          type: integer
          minimum: 1

    CheckoutRequest:
      type: object
      required: [shipping_address, phone]
      properties:
        shipping_address:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 50
        shipping_method:
          type: string
          enum: [standard, express]
          default: standard
        payment_method:
          type: string
          enum: [test_card, cash_on_delivery]
          default: test_card
        cardholder_name:
          type: string
          nullable: true
        card_number:
          type: string
          nullable: true
          description: Test payment only. Use 4000000000000002 to simulate a decline.
        expiry_date:
          type: string
          nullable: true
        cvv:
          type: string
          nullable: true

    ReviewWriteRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true

    MessageWriteRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          maxLength: 2000

    SellerApplicationRequest:
      type: object
      required:
        - shop_name
        - shop_description
        - shop_category
        - tax_id
        - business_phone
        - business_address
        - business_city
        - business_state
        - business_zip
        - business_country
      properties:
        shop_name:
          type: string
        shop_description:
          type: string
        shop_category:
          type: string
        tax_id:
          type: string
        website:
          type: string
          nullable: true
        business_phone:
          type: string
        business_address:
          type: string
        business_city:
          type: string
        business_state:
          type: string
        business_zip:
          type: string
        business_country:
          type: string

    PayoutRequest:
      type: object
      required: [amount, method, account_details]
      properties:
        amount:
          type: number
          format: float
          minimum: 1
        method:
          type: string
          enum: [bank, paypal]
        account_details:
          type: string
          maxLength: 1000

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
        password:
          type: string
          nullable: true
          minLength: 6

    SystemSettings:
      type: object
      required: [platform, payments, email, security, alerts]
      properties:
        platform:
          type: object
          required:
            - platform_name
            - support_email
            - commission_rate
            - currency
            - minimum_order_amount
            - maximum_order_amount
          properties:
            platform_name:
              type: string
              example: MarketAI
            support_email:
              type: string
              format: email
              example: support@marketai.com
            commission_rate:
              type: number
              minimum: 0
              maximum: 100
              example: 10
            currency:
              type: string
              enum: [USD, KHR, EUR, THB]
            minimum_order_amount:
              type: number
              minimum: 0
            maximum_order_amount:
              type: number
              minimum: 0
        payments:
          type: object
          required: [payout_schedule, minimum_payout_amount, payout_processing_days, gateways]
          properties:
            payout_schedule:
              type: string
              enum: [daily, weekly, biweekly, monthly]
            minimum_payout_amount:
              type: number
              minimum: 0
            payout_processing_days:
              type: integer
              minimum: 0
              maximum: 60
            gateways:
              type: object
              required: [stripe, paypal]
              properties:
                stripe:
                  type: boolean
                paypal:
                  type: boolean
        email:
          type: object
          required: [smtp_port, from_email_address, order_emails, marketing_emails]
          properties:
            smtp_server:
              type: string
              nullable: true
            smtp_port:
              type: integer
              minimum: 1
              maximum: 65535
            smtp_username:
              type: string
              nullable: true
            from_email_address:
              type: string
              example: MarketAI <noreply@marketai.com>
            order_emails:
              type: boolean
            marketing_emails:
              type: boolean
        security:
          type: object
          required:
            - require_2fa
            - session_timeout_minutes
            - max_login_attempts
            - minimum_password_length
            - require_strong_passwords
          properties:
            require_2fa:
              type: boolean
            session_timeout_minutes:
              type: integer
              minimum: 5
              maximum: 1440
            max_login_attempts:
              type: integer
              minimum: 1
              maximum: 20
            minimum_password_length:
              type: integer
              minimum: 6
              maximum: 128
            require_strong_passwords:
              type: boolean
        alerts:
          type: object
          required: [new_order, new_seller, dispute, payout, system_alerts]
          properties:
            new_order:
              type: boolean
            new_seller:
              type: boolean
            dispute:
              type: boolean
            payout:
              type: boolean
            system_alerts:
              type: boolean

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
        seller_status:
          type: string
          nullable: true
          enum: [pending, approved, rejected]
        shop_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserRole:
      type: string
      enum: [admin, seller, customer]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
        category_id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
        stock:
          type: integer
        views:
          type: integer
        sales_count:
          type: integer
        rating_avg:
          type: number
          format: float
        rating_count:
          type: integer
        image:
          type: string
          nullable: true
        tags:
          type: string
          nullable: true
        is_active:
          type: boolean
        moderation_status:
          type: string
          enum: [approved, pending_review, rejected]
        moderation_is_fake:
          type: boolean
        moderation_is_illegal:
          type: boolean
        moderation_reason:
          type: string
          nullable: true
        category:
          $ref: "#/components/schemas/Category"
        seller:
          $ref: "#/components/schemas/User"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        reviews_count:
          type: integer
        average_rating:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProductImage:
      type: object
      properties:
